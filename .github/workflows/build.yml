name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # кнопка ручного запуска во вкладке Actions

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf automake \
            libtool libltdl-dev gettext m4 pkg-config zlib1g-dev libncurses-dev \
            cmake libffi-dev libssl-dev build-essential ccache

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython==0.29.36

      - name: Build APK
        run: buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flappy-apk
          path: bin/*.apk
